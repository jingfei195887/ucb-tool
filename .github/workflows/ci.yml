name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-2022]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy (core only)
        run: mypy src/ucb_tool/core
      - name: Pytest
        run: pytest --cov=ucb_tool --cov-branch --cov-report=xml --cov-report=term-missing --cov-fail-under=85
      - uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-22.04' && matrix.python == '3.12'

  package:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: ucbtool-x86_64.AppImage
            script: bash packaging/build_appimage.sh
          - os: windows-2022
            artifact: ucbtool-setup.exe
            script: |
              pyinstaller packaging/ucbtool.spec
              makensis packaging/nsis/installer.nsi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e ".[dev]"
          pip install pillow
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y
      - name: Build
        run: ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
