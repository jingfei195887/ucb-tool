name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
